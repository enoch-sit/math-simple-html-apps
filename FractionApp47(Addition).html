<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FractionApp47(Addition)</title>
    
<link rel="stylesheet" href="css/arith-common.css">
<link rel="stylesheet" href="css/nav.css">
<link rel="stylesheet" href="css/FractionApp47.css">
<link rel="stylesheet" href="css/bar-component.css">
</head>
<body>

<div id="tutorial-hand">👆</div>

<div class="container">
    <div class="header">
        <div class="header-left">
            <div class="title-badge">異分母分數加法</div>
        </div>
        <div class="header-right">
            <div class="controls-pill">
                <label class="checkbox-label">
                    <input type="checkbox" id="show-whole-cb" onchange="toggleWholeNumber()"> 顯示帶分數
                </label>
                <span class="divider"></span>
                <label class="checkbox-label">
                    <input type="checkbox" id="show-nl-cb" onchange="toggleNumberLine()"> 顯示數線
                </label>
                <span class="divider"></span>
                <div class="speed-ctrl">
                    <label for="speed-slider">速度: <span id="speed-val" style="color: var(--blue);">1.0</span>x</label>
                    <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1.0" oninput="updateSpeed()">
                </div>
            </div>
            <button class="lang-btn btn-random" onclick="randomChallenge()">🎲 隨機出題</button>
        </div>
    </div>

    <div id="word-problem" class="word-problem"></div>

    <div class="answer-zone">
        <div class="formula">
            <div class="mixed-frac" id="frac1-group" onclick="onFrac1Click()">
                <input type="number" class="whole-input" id="w1" placeholder=" " min="0" max="10" oninput="updateUI()" onchange="updateUI()">
                <div class="frac">
                    <input type="number" class="frac-input" id="n1" value="1" min="1" max="100" oninput="updateUI()" onchange="updateUI()">
                    <div class="frac-line"></div>
                    <input type="number" class="frac-input" id="d1" value="2" min="1" max="100" oninput="updateUI()" onchange="updateUI()">
                </div>
            </div>
            <span>+</span>
            <div class="mixed-frac" id="frac2-group" onclick="onFrac2Click()">
                <input type="number" class="whole-input" id="w2" placeholder=" " min="0" max="10" oninput="updateUI()" onchange="updateUI()">
                <div class="frac">
                    <input type="number" class="frac-input" id="n2" value="1" min="1" max="100" oninput="updateUI()" onchange="updateUI()">
                    <div class="frac-line"></div>
                    <input type="number" class="frac-input" id="d2" value="3" min="1" max="100" oninput="updateUI()" onchange="updateUI()">
                </div>
            </div>
        </div>
    </div>

    <div class="animation-zone" id="anim-zone">
        <div id="drag-instruction" class="instruction-text">💡 準備中...</div>
        <div id="anim-area"></div>

        <div id="bottom-answer-zone">
            <div id="bot-public-unit" style="font-size: 1.2rem; color: var(--blue); margin-bottom: 10px; font-weight: bold; background: #e8f4f8; padding: 5px 15px; border-radius: 8px;"></div>
            
            <div class="formula">
                <div id="bot-frac1"></div>
                <span>+</span>
                <div id="bot-frac2"></div>
                <span>=</span>
                <div class="mixed-frac" style="cursor: default;">
                    <input type="number" class="whole-input" id="ans-w" placeholder=" " min="0" oninput="autoCheck()">
                    <div class="frac">
                        <input type="number" class="frac-input" id="ans-num" placeholder="?" min="0" oninput="autoCheck()">
                        <div class="frac-line" style="background: #ccc;"></div>
                        <input type="number" class="frac-input" id="ans-den" placeholder="?" min="1" oninput="autoCheck()">
                    </div>
                </div>
            </div>
            <div id="feedback" class="feedback-msg"></div>
        </div>
    </div>
</div>

<script src="js/FractionApp47.js"></script>
</body>
</html>
